name: Deploy to GitHub Pages

on:
  # Uncomment the lines below to automatically deploy on every push to main:
  push:
  branches: [main]

  # Manual trigger: run this workflow from Actions → Run workflow in GitHub.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Resolve base path
        run: |
          OWNER="${GITHUB_REPOSITORY_OWNER}"
          REPO="${GITHUB_REPOSITORY#*/}"
          if [ -n "${{ vars.BASE_PATH }}" ]; then
            echo "BASE_PATH=${{ vars.BASE_PATH }}" >> $GITHUB_ENV
          elif [ "${REPO,,}" = "${OWNER,,}.github.io" ]; then
            echo "BASE_PATH=/" >> $GITHUB_ENV
          else
            echo "BASE_PATH=/${REPO}/" >> $GITHUB_ENV
          fi
          if [ -n "${{ vars.SITE_URL }}" ]; then
            echo "SITE_URL=${{ vars.SITE_URL }}" >> $GITHUB_ENV
          elif [ "${REPO,,}" = "${OWNER,,}.github.io" ]; then
            echo "SITE_URL=https://${OWNER}.github.io" >> $GITHUB_ENV
          else
            echo "SITE_URL=https://${OWNER}.github.io/${REPO}" >> $GITHUB_ENV
          fi

      - name: Build
        run: npm run build
        env:
          SITE_URL: ${{ env.SITE_URL }}
          BASE_PATH: ${{ env.BASE_PATH }}
          GITHUB_USER: ${{ vars.GITHUB_USER }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
